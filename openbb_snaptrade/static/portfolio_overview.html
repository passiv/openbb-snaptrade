<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Overview</title>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>Portfolio Overview</h1>
      <div id="status" class="status"></div>
    </div>
    <button id="refresh" class="btn">Refresh</button>
  </div>

  <div id="totals" class="totals"></div>

  <div class="card">
    <div class="card-title">Asset Exposure</div>
    <div id="exposure" class="exposure"></div>
  </div>

  <div class="card">
    <div class="card-title">Top Positions</div>
    <div id="top-positions" class="positions"></div>
  </div>

  <div class="card">
    <div class="card-title">By Account</div>
    <div id="accounts" class="accounts"></div>
  </div>
</div>
</body>
</html>
